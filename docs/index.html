<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard Cabify</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F8F7FF;color:#111827}
button{cursor:pointer;border:none;font-family:inherit}
select{font-family:inherit}
table{border-collapse:collapse;width:100%}
.wrap{max-width:1200px;margin:0 auto;padding:24px 20px 60px}
.loading-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F8F7FF}
.loading-box{background:white;border-radius:16px;padding:40px 48px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.08);min-width:320px}
.loading-title{font-size:20px;font-weight:700;color:#111827;margin-bottom:8px}
.loading-sub{font-size:14px;color:#6B7280;margin-bottom:20px}
.progress-track{background:#F3F4F6;border-radius:999px;height:8px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:8px;background:#7C3AED;border-radius:999px;transition:width 0.3s}
.progress-pct{font-size:13px;color:#7C3AED;font-weight:600}
.retry-btn{background:#7C3AED;color:white;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:600;margin-top:16px}
.header{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#7C3AED,#5B21B6);border-radius:16px;padding:20px 28px;margin-bottom:20px;color:white}
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo{width:40px;height:40px;background:rgba(255,255,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center}
.title{font-size:22px;font-weight:800;letter-spacing:-0.3px}
.subtitle{font-size:12px;opacity:0.8;margin-top:2px}
.refresh-btn{background:rgba(255,255,255,0.2);color:white;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.select{background:white;border:1px solid #E5E7EB;border-radius:8px;padding:8px 12px;font-size:13px;color:#374151;outline:none}
.clear-btn{background:#FEE2E2;color:#DC2626;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:500}
.result-count{margin-left:auto;font-size:13px;color:#6B7280;font-weight:500}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:white;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.kpi-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.kpi-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.kpi-label{font-size:12px;color:#6B7280;font-weight:500}
.kpi-value{font-size:22px;font-weight:800;line-height:1;margin-bottom:4px}
.kpi-sub{font-size:11px;color:#9CA3AF}
.tabs{display:flex;gap:4px;background:white;border-radius:10px;padding:4px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06);width:fit-content;flex-wrap:wrap}
.tab{padding:8px 20px;border-radius:7px;font-size:13px;font-weight:500;color:#6B7280;background:none;transition:all 0.15s}
.tab.active{background:#7C3AED;color:white;font-weight:600}
.card{background:white;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:16px}
.card-title{font-size:14px;font-weight:700;color:#374151;margin-bottom:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:700px){.grid2{grid-template-columns:1fr}}
.table-wrap{overflow-x:auto;max-height:420px;overflow-y:auto}
th{background:#F9FAFB;padding:10px 12px;text-align:left;font-size:12px;font-weight:600;color:#6B7280;position:sticky;top:0;white-space:nowrap;border-bottom:1px solid #F3F4F6}
td{padding:10px 12px;font-size:13px;color:#374151;border-bottom:1px solid #F9FAFB}
tr:hover td{background:#FAFAFA}
.money{font-weight:600;color:#111827;text-align:right}
.pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
.bar-wrap{display:flex;align-items:center;gap:6px}
.bar-fill{height:6px;border-radius:3px;min-width:2px}
.ruta-arrow{color:#7C3AED;font-weight:700;margin:0 6px}
.total-row td{background:#F5F3FF;font-weight:700;color:#111827}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {createElement:h,useState,useEffect,useCallback,Fragment}=React;
const {BarChart,Bar,LineChart,Line,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,Legend,PieChart,Pie,Cell}=Recharts;
const SHEET_ID='1dvMmTMgiCGiF_1P_f9LhzfaTFCvuy2qa7O2lJ6C8pxc';
const SHEETS=[
  {name:'JUN 25',mes:6,anio:2025,r:'JL'},{name:'JUL 25',mes:7,anio:2025,r:'JL'},
  {name:'AGO 25',mes:8,anio:2025,r:'JL'},{name:'SEP 25',mes:9,anio:2025,r:'JL'},
  {name:'OCT 25',mes:10,anio:2025,r:'JL'},{name:'NOV 25',mes:11,anio:2025,r:'JL'},
  {name:'DIC 25',mes:12,anio:2025,r:'JL'},{name:'ENE 26',mes:1,anio:2026,r:'JL'},
  {name:'FEB 26',mes:2,anio:2026,r:'JL'},{name:'MAR 26',mes:3,anio:2026,r:'KM'},
  {name:'ABR 26',mes:4,anio:2026,r:'KM'},{name:'MAY 26',mes:5,anio:2026,r:'KM'},
  {name:'JUN 26',mes:6,anio:2026,r:'KM'},{name:'JUL 26',mes:7,anio:2026,r:'KM'},
  {name:'AGO 26',mes:8,anio:2026,r:'KM'},{name:'SEP 26',mes:9,anio:2026,r:'KM'},
  {name:'OCT 26',mes:10,anio:2026,r:'KM'},{name:'NOV 26',mes:11,anio:2026,r:'KM'},
  {name:'DIC 26',mes:12,anio:2026,r:'KM'},
];
const MES_N=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MES_F=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const SKIP=new Set(['CC','CLIENTE','TOTAL','TOTAL FACTURA','','NONE','NULL']);
const COLORS=['#7C3AED','#2563EB','#059669','#D97706','#DC2626','#8B5CF6','#0EA5E9','#10B981'];
const fmtCLP=n=>{if(!n)return'$0';if(n>=1e6)return'$'+(n/1e6).toFixed(1)+'M';if(n>=1e3)return'$'+(n/1e3).toFixed(0)+'K';return'$'+Math.round(n).toLocaleString('es-CL');};
const fmtFull=n=>'$'+Math.round(n||0).toLocaleString('es-CL');
const fmtN=n=>Math.round(n||0).toLocaleString('es-CL');
function sheetUrl(name){return'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&sheet='+encodeURIComponent(name);}
function parseCSV(text){
  var rows=[];
  var lines=text.split(/\r?\n/);
  for(var li=0;li<lines.length;li++){
    var line=lines[li];
    if(!line.trim())continue;
    var cells=[];var cur='';var inQ=false;
    for(var i=0;i<line.length;i++){
      var c=line[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){cells.push(cur.trim());cur='';}
      else{cur+=c;}
    }
    cells.push(cur.trim());
    rows.push(cells);
  }
  return rows;
}
function parseMonto(s){if(!s)return 0;var n=parseFloat(String(s).replace(/[^0-9.\-]/g,''));return isNaN(n)?0:n;}
function parseSheet(csv,mes,anio,rc){
  var result=[];
  var r1=rc==='JL'?9:10;
  var r2=rc==='JL'?11:12;
  var rows=parseCSV(csv);
  for(var i=0;i<rows.length;i++){
    var row=rows[i];
    if(row.length<6)continue;
    var cc=row[0].replace(/^"|"$/g,'').trim();
    var cli=row[1].replace(/^"|"$/g,'').trim();
    var trab=row[2].replace(/^"|"$/g,'').trim();
    var dcm=row[3].replace(/^"|"$/g,'').trim();
    var fRaw=row[4].replace(/^"|"$/g,'').trim();
    var monto=parseMonto(row[5]);
    var rel1=row[r1]?row[r1].replace(/^"|"$/g,'').trim():'';
    var rel2=row[r2]?row[r2].replace(/^"|"$/g,'').trim():'';
    if(!cc||!cli||!trab)continue;
    if(SKIP.has(cc.toUpperCase())||SKIP.has(cli.toUpperCase()))continue;
    if(monto<=0)continue;
    var fecha=anio+'-'+String(mes).padStart(2,'0')+'-01';
    var m1=fRaw.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);
    var m2=fRaw.match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})$/);
    if(m1)fecha=m1[3]+'-'+m1[1].padStart(2,'0')+'-'+m1[2].padStart(2,'0');
    else if(m2)fecha=m2[1]+'-'+m2[2].padStart(2,'0')+'-'+m2[3].padStart(2,'0');
    result.push({mes:mes,anio:anio,cc:cc,cliente:cli,trabajador:trab,dcmto:dcm,fecha:fecha,monto:monto,rel1:rel1,rel2:rel2});
  }
  return result;
}
function aggregate(rows){
  var map={};
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    var k=r.anio+'-'+String(r.mes).padStart(2,'0');
    if(!map[k])map[k]={anio:r.anio,mes:r.mes,label:MES_N[r.mes]+' '+r.anio,viajes:0,monto:0,trabajadores:new Set(),clientes:new Set(),relaciones:new Set()};
    map[k].viajes++;map[k].monto+=r.monto;
    map[k].trabajadores.add(r.trabajador);map[k].clientes.add(r.cliente);map[k].relaciones.add(r.cc);
  }
  return Object.values(map).sort(function(a,b){return a.anio!==b.anio?a.anio-b.anio:a.mes-b.mes;})
    .map(function(m){return Object.assign({},m,{trabajadores:m.trabajadores.size,clientes:m.clientes.size,relaciones:m.relaciones.size});});
}
function Tip(props){
  if(!props.active||!props.payload||!props.payload.length)return null;
  return h('div',{style:{background:'#fff',border:'1px solid #E5E7EB',borderRadius:8,padding:'10px 14px',fontSize:13}},
    h('p',{style:{fontWeight:600,marginBottom:6}},props.label),
    props.payload.map(function(p,i){
      return h('p',{key:i,style:{color:p.color}},p.name+': ',h('strong',null,props.isMoney?fmtFull(p.value):fmtN(p.value)));
    })
  );
}
function Dashboard(){
  var s=useState([]);var allRows=s[0];var setAllRows=s[1];
  var s2=useState(true);var loading=s2[0];var setLoading=s2[1];
  var s3=useState({done:0,total:SHEETS.length});var prog=s3[0];var setProg=s3[1];
  var s4=useState(null);var error=s4[0];var setError=s4[1];
  var s5=useState('all');var filterYear=s5[0];var setFilterYear=s5[1];
  var s6=useState('all');var filterMonth=s6[0];var setFilterMonth=s6[1];
  var s7=useState('resumen');var tab=s7[0];var setTab=s7[1];
  var s8=useState(null);var lastFetch=s8[0];var setLastFetch=s8[1];

  var fetchAll=useCallback(function(){
    setLoading(true);setError(null);setProg({done:0,total:SHEETS.length});
    var rows=[];var done=0;
    function next(idx){
      if(idx>=SHEETS.length){
        if(!rows.length)setError('No se cargaron datos.');
        setAllRows(rows);setLastFetch(new Date());setLoading(false);return;
      }
      var sheet=SHEETS[idx];
      fetch(sheetUrl(sheet.name)).then(function(res){
        return res.ok?res.text():Promise.reject();
      }).then(function(text){
        if(!text.includes('<!DOCTYPE')&&!text.includes('errorMessage')){
          rows=rows.concat(parseSheet(text,sheet.mes,sheet.anio,sheet.r));
        }
      }).catch(function(){}).finally(function(){
        done++;setProg({done:done,total:SHEETS.length});next(idx+1);
      });
    }
    next(0);
  },[]);

  useEffect(function(){fetchAll();},[fetchAll]);

  var years=[...new Set(allRows.map(function(r){return r.anio;}))].sort();
  var filtered=allRows.filter(function(r){
    return(filterYear==='all'||r.anio===+filterYear)&&(filterMonth==='all'||r.mes===+filterMonth);
  });
  var monthly=aggregate(filterYear==='all'?allRows:allRows.filter(function(r){return r.anio===+filterYear;}));
  var totalMonto=filtered.reduce(function(a,r){return a+r.monto;},0);
  var totalViajes=filtered.length;
  var trabajadores=new Set(filtered.map(function(r){return r.trabajador;})).size;
  var relaciones=new Set(filtered.map(function(r){return r.cc;})).size;
  var clientes=new Set(filtered.map(function(r){return r.cliente;})).size;
  var avgTicket=totalViajes>0?totalMonto/totalViajes:0;

  var byCliente={};
  filtered.forEach(function(r){
    if(!byCliente[r.cliente])byCliente[r.cliente]={viajes:0,monto:0};
    byCliente[r.cliente].viajes++;byCliente[r.cliente].monto+=r.monto;
  });
  var topCM=Object.entries(byCliente).sort(function(a,b){return b[1].monto-a[1].monto;}).slice(0,10);
  var topCV=Object.entries(byCliente).sort(function(a,b){return b[1].viajes-a[1].viajes;}).slice(0,10);

  var byTrab={};
  filtered.forEach(function(r){
    if(!byTrab[r.trabajador])byTrab[r.trabajador]={viajes:0,monto:0};
    byTrab[r.trabajador].viajes++;byTrab[r.trabajador].monto+=r.monto;
  });
  var topTM=Object.entries(byTrab).sort(function(a,b){return b[1].monto-a[1].monto;}).slice(0,10);
  var topTV=Object.entries(byTrab).sort(function(a,b){return b[1].viajes-a[1].viajes;}).slice(0,10);

  var pieData=topCM.slice(0,6).map(function(x){return{name:x[0],value:x[1].monto};});

  var byRuta={};
  filtered.forEach(function(r){
    if(!r.rel1||!r.rel2)return;
    var k=r.rel1+' -> '+r.rel2;
    if(!byRuta[k])byRuta[k]={rel1:r.rel1,rel2:r.rel2,viajes:0,monto:0};
    byRuta[k].viajes++;byRuta[k].monto+=r.monto;
  });
  var topRutas=Object.values(byRuta).sort(function(a,b){return b.monto-a.monto;});
  var totalRutas=topRutas.reduce(function(a,r){return a+r.monto;},0);
  var totalViajesRutas=topRutas.reduce(function(a,r){return a+r.viajes;},0);

  var kpis=[
    {label:'Total gastado',value:fmtFull(totalMonto),sub:fmtCLP(totalMonto),color:'#7C3AED',bg:'#EDE9FE',icon:'💳'},
    {label:'Viajes',value:fmtN(totalViajes),sub:'Prom. '+fmtCLP(avgTicket)+'/viaje',color:'#2563EB',bg:'#DBEAFE',icon:'🚗'},
    {label:'Trabajadores',value:fmtN(trabajadores),sub:'activos en período',color:'#059669',bg:'#D1FAE5',icon:'👤'},
    {label:'Relaciones (CC)',value:fmtN(relaciones),sub:'CCs facturados',color:'#D97706',bg:'#FEF3C7',icon:'🔗'},
    {label:'Clientes',value:fmtN(clientes),sub:'cuentas distintas',color:'#DC2626',bg:'#FEE2E2',icon:'🏢'},
  ];

  if(loading){
    var pct=Math.round((prog.done/prog.total)*100);
    return h('div',{className:'loading-wrap'},
      h('div',{className:'loading-box'},
        h('h2',{className:'loading-title'},'Cargando datos de Cabify'),
        h('p',{className:'loading-sub'},'Leyendo hojas... '+prog.done+'/'+prog.total),
        h('div',{className:'progress-track'},h('div',{className:'progress-fill',style:{width:pct+'%'}})),
        h('p',{className:'progress-pct'},pct+'%')
      )
    );
  }
  if(error){
    return h('div',{className:'loading-wrap'},
      h('div',{className:'loading-box'},
        h('div',{style:{fontSize:48,marginBottom:12}},'⚠️'),
        h('h2',{className:'loading-title'},'Error al cargar'),
        h('p',{className:'loading-sub',style:{color:'#DC2626'}},error),
        h('button',{className:'retry-btn',onClick:fetchAll},'Reintentar')
      )
    );
  }

  return h('div',{className:'wrap'},
    h('header',{className:'header'},
      h('div',{className:'logo-wrap'},
        h('div',{className:'logo'},
          h('svg',{width:22,height:22,viewBox:'0 0 24 24',fill:'none'},
            h('path',{d:'M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z',fill:'white',fillOpacity:'0.9'}),
            h('circle',{cx:12,cy:9,r:2.5,fill:'#7C3AED'})
          )
        ),
        h('div',null,
          h('div',{className:'title'},'Dashboard Cabify'),
          h('div',{className:'subtitle'},lastFetch?'Actualizado '+lastFetch.toLocaleDateString('es-CL')+'  -  ':'Cargando...  -  ',fmtN(allRows.length),' viajes')
        )
      ),
      h('button',{className:'refresh-btn',onClick:fetchAll},'Actualizar')
    ),
    h('div',{className:'toolbar'},
      h('select',{className:'select',value:filterYear,onChange:function(e){setFilterYear(e.target.value);}},
        h('option',{value:'all'},'Todos los años'),
        years.map(function(y){return h('option',{key:y,value:y},y);})
      ),
      h('select',{className:'select',value:filterMonth,onChange:function(e){setFilterMonth(e.target.value);}},
        h('option',{value:'all'},'Todos los meses'),
        Array.from({length:12},function(_,i){return h('option',{key:i+1,value:i+1},MES_F[i+1]);})
      ),
      (filterYear!=='all'||filterMonth!=='all')&&h('button',{className:'clear-btn',onClick:function(){setFilterYear('all');setFilterMonth('all');}},'✕ Limpiar'),
      h('span',{className:'result-count'},fmtN(filtered.length),' viajes')
    ),
    h('div',{className:'kpi-grid'},
      kpis.map(function(k){
        return h('div',{key:k.label,className:'kpi-card',style:{borderTop:'3px solid '+k.color}},
          h('div',{className:'kpi-header'},
            h('span',{className:'kpi-icon',style:{background:k.bg}},k.icon),
            h('span',{className:'kpi-label'},k.label)
          ),
          h('div',{className:'kpi-value',style:{color:k.color}},k.value),
          h('div',{className:'kpi-sub'},k.sub)
        );
      })
    ),
    h('div',{className:'tabs'},
      ['resumen','clientes','trabajadores','rutas','detalle'].map(function(t){
        return h('button',{key:t,className:'tab'+(tab===t?' active':''),onClick:function(){setTab(t);}},
          t.charAt(0).toUpperCase()+t.slice(1)
        );
      })
    ),

    tab==='resumen'&&h(Fragment,null,
      h('div',{className:'card'},
        h('div',{className:'card-title'},'Gasto mensual (CLP)'),
        h(ResponsiveContainer,{width:'100%',height:240},
          h(BarChart,{data:monthly,margin:{top:5,right:10,left:10,bottom:5}},
            h(CartesianGrid,{strokeDasharray:'3 3',stroke:'#F3F4F6'}),
            h(XAxis,{dataKey:'label',tick:{fontSize:11,fill:'#9CA3AF'}}),
            h(YAxis,{tickFormatter:fmtCLP,tick:{fontSize:11,fill:'#9CA3AF'},width:62}),
            h(Tooltip,{content:h(Tip,{isMoney:true})}),
            h(Bar,{dataKey:'monto',name:'Total',fill:'#7C3AED',radius:[4,4,0,0]})
          )
        )
      ),
      h('div',{className:'grid2'},
        h('div',{className:'card'},
          h('div',{className:'card-title'},'Viajes por mes'),
          h(ResponsiveContainer,{width:'100%',height:200},
            h(BarChart,{data:monthly,margin:{top:5,right:10,left:0,bottom:5}},
              h(CartesianGrid,{strokeDasharray:'3 3',stroke:'#F3F4F6'}),
              h(XAxis,{dataKey:'label',tick:{fontSize:10,fill:'#9CA3AF'}}),
              h(YAxis,{tick:{fontSize:10,fill:'#9CA3AF'},width:28}),
              h(Tooltip,{content:h(Tip,null)}),
              h(Bar,{dataKey:'viajes',name:'Viajes',fill:'#2563EB',radius:[3,3,0,0]})
            )
          )
        ),
        h('div',{className:'card'},
          h('div',{className:'card-title'},'Trabajadores - Clientes - Relaciones'),
          h(ResponsiveContainer,{width:'100%',height:200},
            h(LineChart,{data:monthly,margin:{top:5,right:10,left:0,bottom:5}},
              h(CartesianGrid,{strokeDasharray:'3 3',stroke:'#F3F4F6'}),
              h(XAxis,{dataKey:'label',tick:{fontSize:10,fill:'#9CA3AF'}}),
              h(YAxis,{tick:{fontSize:10,fill:'#9CA3AF'},width:25}),
              h(Tooltip,{content:h(Tip,null)}),
              h(Legend,{iconType:'circle',iconSize:8,wrapperStyle:{fontSize:11,paddingTop:8}}),
              h(Line,{type:'monotone',dataKey:'trabajadores',name:'Trabajadores',stroke:'#059669',strokeWidth:2,dot:{r:3}}),
              h(Line,{type:'monotone',dataKey:'clientes',name:'Clientes',stroke:'#DC2626',strokeWidth:2,dot:{r:3}}),
              h(Line,{type:'monotone',dataKey:'relaciones',name:'Relaciones',stroke:'#D97706',strokeWidth:2,dot:{r:3},strokeDasharray:'4 2'})
            )
          )
        )
      ),
      h('div',{className:'card'},
        h('div',{className:'card-title'},'Resumen por mes'),
        h('div',{className:'table-wrap'},
          h('table',null,
            h('thead',null,
              h('tr',null,
                ['Periodo','Total (CLP)','Viajes','Ticket prom.','Trabajadores','Relaciones','Clientes'].map(function(c){return h('th',{key:c},c);})
              )
            ),
            h('tbody',null,
              monthly.map(function(m,i){
                return h('tr',{key:i},
                  h('td',null,h('strong',null,MES_F[m.mes]+' '+m.anio)),
                  h('td',{className:'money'},fmtFull(m.monto)),
                  h('td',null,fmtN(m.viajes)),
                  h('td',null,fmtCLP(m.monto/m.viajes)),
                  h('td',null,h('span',{className:'pill',style:{background:'#D1FAE5',color:'#065F46'}},m.trabajadores)),
                  h('td',null,h('span',{className:'pill',style:{background:'#FEF3C7',color:'#92400E'}},m.relaciones)),
                  h('td',null,h('span',{className:'pill',style:{background:'#DBEAFE',color:'#1E40AF'}},m.clientes))
                );
              })
            )
          )
        )
      )
    ),

    tab==='clientes'&&h(Fragment,null,
      h('div',{className:'grid2'},
        h('div',{className:'card'},
          h('div',{className:'card-title'},'Gasto por cliente (mayor a menor)'),
          h(ResponsiveContainer,{width:'100%',height:300},
            h(BarChart,{data:topCM.slice().reverse().map(function(x){return{name:x[0],monto:x[1].monto};}),layout:'vertical',margin:{left:90,right:20}},
              h(XAxis,{type:'number',tickFormatter:fmtCLP,tick:{fontSize:10,fill:'#9CA3AF'}}),
              h(YAxis,{type:'category',dataKey:'name',tick:{fontSize:11,fill:'#374151'},width:90}),
              h(Tooltip,{content:h(Tip,{isMoney:true})}),
              h(Bar,{dataKey:'monto',name:'Monto',fill:'#7C3AED',radius:[0,4,4,0]})
            )
          )
        ),
        h('div',{className:'card'},
          h('div',{className:'card-title'},'Viajes por cliente (mayor a menor)'),
          h(ResponsiveContainer,{width:'100%',height:300},
            h(BarChart,{data:topCV.slice().reverse().map(function(x){return{name:x[0],viajes:x[1].viajes};}),layout:'vertical',margin:{left:90,right:20}},
              h(XAxis,{type:'number',tick:{fontSize:10,fill:'#9CA3AF'}}),
              h(YAxis,{type:'category',dataKey:'name',tick:{fontSize:11,fill:'#374151'},width:90}),
              h(Tooltip,{content:h(Tip,null)}),
              h(Bar,{dataKey:'viajes',name:'Viajes',fill:'#2563EB',radius:[0,4,4,0]})
            )
          )
        )
      ),
      h('div',{className:'card'},
        h('div',{className:'card-title'},'Detalle por cliente'),
        h('div',{className:'table-wrap'},
          h('table',null,
            h('thead',null,h('tr',null,['#','Cliente','Viajes','Monto total','% del total','Ticket prom.'].map(function(c){return h('th',{key:c},c);}))),
            h('tbody',null,
              topCM.map(function(x,i){
                var pct=totalMonto>0?x[1].monto/totalMonto*100:0;
                return h('tr',{key:i},
                  h('td',{style:{color:'#9CA3AF',width:30}},i+1),
                  h('td',null,h('strong',null,x[0])),
                  h('td',null,fmtN(x[1].viajes)),
                  h('td',{className:'money'},fmtFull(x[1].monto)),
                  h('td',null,h('div',{className:'bar-wrap'},h('div',{className:'bar-fill',style:{width:Math.min(pct,100)+'%',background:COLORS[i%COLORS.length]}}),h('span',null,pct.toFixed(1)+'%'))),
                  h('td',null,fmtCLP(x[1].monto/x[1].viajes))
                );
              })
            )
          )
        )
      )
    ),

    tab==='trabajadores'&&h(Fragment,null,
      h('div',{className:'grid2'},
        h('div',{className:'card'},
          h('div',{className:'card-title'},'Monto por trabajador (mayor a menor)'),
          h(ResponsiveContainer,{width:'100%',height:300},
            h(BarChart,{data:topTM.slice().reverse().map(function(x){return{name:x[0].split(' ')[0],monto:x[1].monto};}),layout:'vertical',margin:{left:70,right:20}},
              h(XAxis,{type:'number',tickFormatter:fmtCLP,tick:{fontSize:10,fill:'#9CA3AF'}}),
              h(YAxis,{type:'category',dataKey:'name',tick:{fontSize:11,fill:'#374151'},width:70}),
              h(Tooltip,{content:h(Tip,{isMoney:true})}),
              h(Bar,{dataKey:'monto',name:'Monto',fill:'#7C3AED',radius:[0,4,4,0]})
            )
          )
        ),
        h('div',{className:'card'},
          h('div',{className:'card-title'},'Viajes por trabajador (mayor a menor)'),
          h(ResponsiveContainer,{width:'100%',height:300},
            h(BarChart,{data:topTV.slice().reverse().map(function(x){return{name:x[0].split(' ')[0],viajes:x[1].viajes};}),layout:'vertical',margin:{left:70,right:20}},
              h(XAxis,{type:'number',tick:{fontSize:10,fill:'#9CA3AF'}}),
              h(YAxis,{type:'category',dataKey:'name',tick:{fontSize:11,fill:'#374151'},width:70}),
              h(Tooltip,{content:h(Tip,null)}),
              h(Bar,{dataKey:'viajes',name:'Viajes',fill:'#059669',radius:[0,4,4,0]})
            )
          )
        )
      ),
      h('div',{className:'card'},
        h('div',{className:'card-title'},'Detalle por trabajador'),
        h('div',{className:'table-wrap'},
          h('table',null,
            h('thead',null,h('tr',null,['#','Trabajador','Viajes','Monto total','% del total','Ticket prom.'].map(function(c){return h('th',{key:c},c);}))),
            h('tbody',null,
              topTM.map(function(x,i){
                var pct=totalMonto>0?x[1].monto/totalMonto*100:0;
                var init=x[0].split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
                return h('tr',{key:i},
                  h('td',{style:{color:'#9CA3AF',width:30}},i+1),
                  h('td',null,
                    h('div',{style:{display:'flex',alignItems:'center',gap:8}},
                      h('div',{style:{width:28,height:28,borderRadius:'50%',background:'#EDE9FE',color:'#7C3AED',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700}},init),
                      h('strong',null,x[0])
                    )
                  ),
                  h('td',null,fmtN(x[1].viajes)),
                  h('td',{className:'money'},fmtFull(x[1].monto)),
                  h('td',null,h('div',{className:'bar-wrap'},h('div',{className:'bar-fill',style:{width:Math.min(pct,100)+'%',background:'#059669'}}),h('span',null,pct.toFixed(1)+'%'))),
                  h('td',null,fmtCLP(x[1].monto/x[1].viajes))
                );
              })
            )
          )
        )
      )
    ),

    tab==='rutas'&&h('div',{className:'card'},
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}},
        h('div',{className:'card-title',style:{marginBottom:0}},'Rutas (Relacion 1 - Relacion 2)'),
        h('span',{className:'pill',style:{background:'#EDE9FE',color:'#7C3AED',fontSize:12}},topRutas.length,' rutas')
      ),
      h('div',{className:'table-wrap',style:{maxHeight:600}},
        h('table',null,
          h('thead',null,h('tr',null,['#','Ruta','Monto','Viajes'].map(function(c){return h('th',{key:c},c);}))),
          h('tbody',null,
            topRutas.map(function(r,i){
              return h('tr',{key:i},
                h('td',{style:{color:'#9CA3AF',width:30}},i+1),
                h('td',null,r.rel1+' -> '+r.rel2),
                h('td',{className:'money'},fmtFull(r.monto)),
                h('td',null,fmtN(r.viajes))
              );
            }).concat([
              h('tr',{key:'total',className:'total-row'},
                h('td',null),
                h('td',null,'TOTAL'),
                h('td',{className:'money'},fmtFull(totalRutas)),
                h('td',null,fmtN(totalViajesRutas))
              )
            ])
          )
        )
      )
    ),

    tab==='detalle'&&h('div',{className:'card'},
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}},
        h('div',{className:'card-title',style:{marginBottom:0}},'Detalle de viajes'),
        h('span',{className:'pill',style:{background:'#DBEAFE',color:'#1E40AF',fontSize:12}},fmtN(filtered.length),' registros')
      ),
      h('div',{className:'table-wrap',style:{maxHeight:520}},
        h('table',null,
          h('thead',null,
            h('tr',null,
              ['Fecha','CC','Cliente','Trabajador','Tipo','Monto','Rel.1','Rel.2'].map(function(c){return h('th',{key:c},c);})
            )
          ),
          h('tbody',null,
            filtered.slice(0,500).map(function(r,i){
              return h('tr',{key:i},
                h('td',{style:{whiteSpace:'nowrap',color:'#6B7280'}},r.fecha),
                h('td',{style:{fontFamily:'monospace',fontSize:12,color:'#6B7280'}},r.cc),
                h('td',null,h('strong',null,r.cliente)),
                h('td',null,r.trabajador),
                h('td',null,h('span',{className:'pill',style:{background:r.dcmto==='FX'?'#DBEAFE':'#D1FAE5',color:r.dcmto==='FX'?'#1E40AF':'#065F46'}},r.dcmto||'-')),
                h('td',{className:'money'},fmtFull(r.monto)),
                h('td',{style:{fontSize:12,color:'#6B7280'}},r.rel1||'-'),
                h('td',{style:{fontSize:12,color:'#6B7280'}},r.rel2||'-')
              );
            })
          )
        ),
        filtered.length>500&&h('p',{style:{textAlign:'center',padding:12,fontSize:12,color:'#9CA3AF'}},'Mostrando 500 de '+fmtN(filtered.length)+' registros')
      )
    )
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(h(Dashboard,null));
</script>
</body>
</html>
