<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard Cabify</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F8F7FF;color:#111827}
button{cursor:pointer;border:none;font-family:inherit}
select{font-family:inherit}
table{border-collapse:collapse;width:100%}
.wrap{max-width:1200px;margin:0 auto;padding:24px 20px 60px}
.loading-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F8F7FF}
.loading-box{background:white;border-radius:16px;padding:40px 48px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.08);min-width:320px}
.loading-title{font-size:20px;font-weight:700;color:#111827;margin-bottom:8px}
.loading-sub{font-size:14px;color:#6B7280;margin-bottom:20px}
.progress-track{background:#F3F4F6;border-radius:999px;height:8px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:8px;background:#7C3AED;border-radius:999px;transition:width 0.3s}
.progress-pct{font-size:13px;color:#7C3AED;font-weight:600}
.retry-btn{background:#7C3AED;color:white;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:600;margin-top:16px}
.header{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#7C3AED,#5B21B6);border-radius:16px;padding:20px 28px;margin-bottom:20px;color:white}
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo{width:40px;height:40px;background:rgba(255,255,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center}
.title{font-size:22px;font-weight:800;letter-spacing:-0.3px}
.subtitle{font-size:12px;opacity:0.8;margin-top:2px}
.refresh-btn{background:rgba(255,255,255,0.2);color:white;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.select{background:white;border:1px solid #E5E7EB;border-radius:8px;padding:8px 12px;font-size:13px;color:#374151;outline:none}
.clear-btn{background:#FEE2E2;color:#DC2626;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:500}
.result-count{margin-left:auto;font-size:13px;color:#6B7280;font-weight:500}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:white;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.kpi-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.kpi-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.kpi-label{font-size:12px;color:#6B7280;font-weight:500}
.kpi-value{font-size:22px;font-weight:800;line-height:1;margin-bottom:4px}
.kpi-sub{font-size:11px;color:#9CA3AF}
.tabs{display:flex;gap:4px;background:white;border-radius:10px;padding:4px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06);width:fit-content;flex-wrap:wrap}
.tab{padding:8px 20px;border-radius:7px;font-size:13px;font-weight:500;color:#6B7280;background:none;transition:all 0.15s}
.tab.active{background:#7C3AED;color:white;font-weight:600}
.card{background:white;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:16px}
.card-title{font-size:14px;font-weight:700;color:#374151;margin-bottom:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:700px){.grid2{grid-template-columns:1fr}}
.table-wrap{overflow-x:auto;max-height:420px;overflow-y:auto}
th{background:#F9FAFB;padding:10px 12px;text-align:left;font-size:12px;font-weight:600;color:#6B7280;position:sticky;top:0;white-space:nowrap;border-bottom:1px solid #F3F4F6}
td{padding:10px 12px;font-size:13px;color:#374151;border-bottom:1px solid #F9FAFB}
tr:hover td{background:#FAFAFA}
.money{font-weight:600;color:#111827;text-align:right}
.pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
.bar-wrap{display:flex;align-items:center;gap:6px}
.bar-fill{height:6px;border-radius:3px;min-width:2px}
.ruta-arrow{color:#7C3AED;font-weight:700;margin:0 6px}
.total-row td{background:#F5F3FF;font-weight:700;color:#111827}
</style>
</head>

<div id="root"></div>
<script>
const {createElement:h,useState,useEffect,useCallback,Fragment}=React;
const {BarChart,Bar,LineChart,Line,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,Legend,PieChart,Pie,Cell}=Recharts;

const SHEET_ID='1dvMmTMgiCGiF_1P_f9LhzfaTFCvuy2qa7O2lJ6C8pxc';
const SHEETS=[
  {name:'JUN 25',mes:6,anio:2025,relCols:'JL'},{name:'JUL 25',mes:7,anio:2025,relCols:'JL'},
  {name:'AGO 25',mes:8,anio:2025,relCols:'JL'},{name:'SEP 25',mes:9,anio:2025,relCols:'JL'},

function sheetUrl(name){return`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;}
function parseCSV(text){const rows=[];for(const line of text.split(/\r?\n/)){if(!line.trim())continue;const cells=[];let cur='',inQ=false;for(const c of line){if(c==='"')inQ=!inQ;else if(c===','&&!inQ){cells.push(cur.trim());cur='';}else cur+=c;}cells.push(cur.trim());rows.push(cells);}return rows;}
function parseMonto(s){if(!s)return 0;const n=parseFloat(String(s).replace(/[^0-9.\-]/g,''));return isNaN(n)?0:n;}

function parseSheet(csv,mes,anio,relCols){
  const result=[];
  const r1idx=relCols==='JL'?9:10;
  const r2idx=relCols==='JL'?11:12;
  for(const row of parseCSV(csv)){
    if(row.length<6)continue;
    const cc=row[0].replace(/^"|"$/g,'').trim();
    const cliente=row[1].replace(/^"|"$/g,'').trim();
    const trabajador=row[2].replace(/^"|"$/g,'').trim();
    const dcmto=row[3].replace(/^"|"$/g,'').trim();
    const fechaRaw=row[4].replace(/^"|"$/g,'').trim();
    const montoRaw=row[5];
    const rel1=row[r1idx]?row[r1idx].replace(/^"|"$/g,'').trim():'';
    const rel2=row[r2idx]?row[r2idx].replace(/^"|"$/g,'').trim():'';
    const monto=parseMonto(montoRaw);
    if(!cc||!cliente||!trabajador)continue;
    if(SKIP.has(cc.toUpperCase())||SKIP.has(cliente.toUpperCase()))continue;
    if(monto<=0)continue;
    let fecha=`${anio}-${String(mes).padStart(2,'0')}-01`;
    const m1=fechaRaw.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    const m2=fechaRaw.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
    if(m1)fecha=`${m1[3]}-${m1[1].padStart(2,'0')}-${m1[2].padStart(2,'0')}`;
    else if(m2)fecha=`${m2[1]}-${m2[2].padStart(2,'0')}-${m2[3].padStart(2,'0')}`;
    result.push({mes,anio,cc,cliente,trabajador,dcmto,fecha,monto,rel1,rel2});
  }
  return result;

function aggregate(rows){
  const map={};
  for(const r of rows){
    const k=`${r.anio}-${String(r.mes).padStart(2,'0')}`;
    if(!map[k])map[k]={anio:r.anio,mes:r.mes,label:`${MES_NAMES[r.mes]} ${r.anio}`,viajes:0,monto:0,trabajadores:new Set(),clientes:new Set(),relaciones:new Set()};
    map[k].viajes++;map[k].monto+=r.monto;
    map[k].trabajadores.add(r.trabajador);map[k].clientes.add(r.cliente);map[k].relaciones.add(r.cc);
  }
  return Object.values(map).sort((a,b)=>a.anio!==b.anio?a.anio-b.anio:a.mes-b.mes)
    .map(m=>({...m,trabajadores:m.trabajadores.size,clientes:m.clientes.size,relaciones:m.relaciones.size}));
}

function Tip({active,payload,label,isMoney}){
  if(!active||!payload?.length)return null;
  return h('div',{style:{background:'#fff',border:'1px solid #E5E7EB',borderRadius:8,padding:'10px 14px',boxShadow:'0 4px 12px rgba(0,0,0,0.1)',fontSize:13}},
    h('p',{style:{fontWeight:600,marginBottom:6,color:'#111827'}},label),
    payload.map((p,i)=>h('p',{key:i,style:{color:p.color,margin:'2px 0'}},p.name,': ',h('strong',null,isMoney?fmtFull(p.value):fmtN(p.value))))
  );
}

      try{
        const res=await fetch(sheetUrl(sheet.name));
        if(!res.ok){done++;setProg({done,total:SHEETS.length});continue;}
        const text=await res.text();
        if(text.includes('<!DOCTYPE')||text.includes('errorMessage')){done++;setProg({done,total:SHEETS.length});continue;}
        rows.push(...parseSheet(text,sheet.mes,sheet.anio,sheet.relCols));
      }catch(e){}
      done++;setProg({done,total:SHEETS.length});

  const avgTicket=totalViajes>0?totalMonto/totalViajes:0;

  const byCliente={};filtered.forEach(r=>{if(!byCliente[r.cliente])byCliente[r.cliente]={viajes:0,monto:0};byCliente[r.cliente].viajes++;byCliente[r.cliente].monto+=r.monto;});

  const byRuta={};
  filtered.forEach(r=>{
    if(!r.rel1||!r.rel2)return;
    const k=`${r.rel1} → ${r.rel2}`;

  });
  const topRutas=Object.values(byRuta).sort((a,b)=>b.monto-a.monto);
  const totalMontoRutas=topRutas.reduce((a,r)=>a+r.monto,0);

  const kpis=[
    {label:'Total gastado',value:fmtFull(totalMonto),sub:fmtCLP(totalMonto),color:'#7C3AED',bg:'#EDE9FE',icon:'💳'},
    {label:'Viajes',value:fmtN(totalViajes),sub:`Prom. ${fmtCLP(avgTicket)}/viaje`,color:'#2563EB',bg:'#DBEAFE',icon:'🚗'},
    {label:'Trabajadores',value:fmtN(trabajadores),sub:'activos en período',color:'#059669',bg:'#D1FAE5',icon:'👤'},
    {label:'Relaciones (CC)',value:fmtN(relaciones),sub:'CCs facturados',color:'#D97706',bg:'#FEF3C7',icon:'🔗'},

  return h('div',{className:'wrap'},
    h('header',{className:'header'},

      ),
      h('button',{className:'refresh-btn',onClick:fetchAll},'↻ Actualizar')
